<!DOCTYPE html>
<html>

<head>

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    minimum-scale=1,
    maximum-scale=1,
    user-scalable=no,
    viewport-fit=cover
  "
>

<style>

html,body{
  margin:0;
  overflow:hidden;
  background:#d6f3ff;
  font-family:Arial;
  touch-action:none;
  overscroll-behavior:none;
  user-select:none;
  width:100%;
  height:100%;
  position:fixed;
}


/* SINH VẬT */

.fly{
  position:absolute;
  font-size:55px;
  cursor:pointer;
  transition:0.15s;
  z-index:10;
}


/* ĐIỂM */

#score{
  position:fixed;
  top:10px;
  left:10px;
  background:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:24px;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}


/* ONG CÒN LẠI */

#beeCount{
  position:fixed;
  top:10px;
  right:10px;
  background:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:24px;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}


/* NÚT */

#openButton{
  position:fixed;
  top:80px;
  right:10px;
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  font-size:30px;
  background:white;
  z-index:999;
}


/* PANEL */

#loaderPanel{
  position:fixed;
  top:150px;
  right:10px;
  width:220px;
  background:white;
  border-radius:20px;
  padding:10px;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  display:none;
}

#vocabInput{
  width:100%;
  height:90px;
  font-size:14px;
  border-radius:10px;
  padding:8px;
  box-sizing:border-box;
}

#loadButton{
  margin-top:8px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:white;
  font-size:16px;
  font-weight:bold;
}


/* ĐÁP ÁN */

.answerBox{
  position:fixed;
  bottom:35px;
  width:42%;
  height:85px;
  background:white;
  border:4px solid black;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.15s;
}


/* CHỮ */

#word{
  position:absolute;
  background:yellow;
  padding:12px 20px;
  border:4px solid black;
  border-radius:25px;
  font-size:28px;
  font-weight:bold;
  z-index:20;
  pointer-events:none;
  box-shadow:0 6px 12px rgba(0,0,0,0.25);
  transition:0.5s;
  display:none;
}

</style>
</head>

<body>

<div id="score">
Điểm: 0
</div>

<div id="beeCount">
🐝 3
</div>

<button id="openButton">
📚
</button>

<div id="word"></div>


<div id="loaderPanel">

<textarea id="vocabInput">
apple=quả táo
banana=quả chuối
dog=con chó
cat=con mèo
fish=cá
sun=mặt trời
car=xe hơi
girl=bé gái
</textarea>

<button id="loadButton">
Nạp bài học 😄
</button>

</div>


<script>


// KHÓA ZOOM
document.addEventListener(
  "gesturestart",
  function(e){
    e.preventDefault();
  }
);

document.addEventListener(
  "dblclick",
  function(e){
    e.preventDefault();
  },
  { passive:false }
);


let score = 0;

let currentAnswer = "";

let currentFly = null;

let noiseCount = 0;

let maxBee = 3;

const scoreBox =
  document.getElementById("score");

const beeBox =
  document.getElementById("beeCount");

const wordBox =
  document.getElementById("word");


// DANH SÁCH TỪ
let words = [];


// NẠP TỪ
function loadVocabulary(){

  words = [];

  let text =
    document.getElementById("vocabInput").value;

  let lines = text.split("\n");


  for(let line of lines){

    if(line.includes("=")){

      let parts = line.split("=");

      words.push({
        english: parts[0].trim(),
        vietnamese: parts[1].trim()
      });

    }

  }

}


// UPDATE
function updateUI(){

  scoreBox.innerHTML =
    "Điểm: " + score;

  let beeCount =
    document.querySelectorAll(".bee").length;

  beeBox.innerHTML =
    "🐝 " + beeCount;

}


// TẠO ĐÁP ÁN
function createAnswerBoxes(correctAnswer){

  document
    .querySelectorAll(".answerBox")
    .forEach(box=>box.remove());


  let answers = [];

  answers.push(correctAnswer);


  while(answers.length < 2){

    let random =
      words[
        Math.floor(
          Math.random()*words.length
        )
      ];

    if(
      !answers.includes(
        random.vietnamese
      )
    ){

      answers.push(
        random.vietnamese
      );

    }

  }


  answers.sort(
    ()=>Math.random()-0.5
  );


  for(let i=0;i<2;i++){

    let box =
      document.createElement("div");

    box.className =
      "answerBox";

    box.innerHTML =
      answers[i];

    box.dataset.answer =
      answers[i];


    if(i==0){

      box.style.left =
        "4%";

    }else{

      box.style.right =
        "4%";

    }


    box.onclick = function(){

      if(currentFly == null){
        return;
      }


      // CHỮ BAY
      if(i==0){

        wordBox.style.left =
          "10%";

      }else{

        wordBox.style.left =
          "55%";

      }

      wordBox.style.top =
        (window.innerHeight - 220) + "px";


      // ĐÚNG
      if(
        box.dataset.answer ==
        currentAnswer
      ){

        navigator.vibrate([40,30,40]);

        score += 5;

        updateUI();


        box.style.background =
          "#9cff9c";


        setTimeout(function(){

          wordBox.style.display =
            "none";

        },500);

      }


      // SAI
      else{

        navigator.vibrate([100,50,100]);

        createNoise();


        box.style.background =
          "#ff9c9c";


        setTimeout(function(){

          box.style.background =
            "white";

        },300);

      }


      currentFly = null;

    }

    document.body.appendChild(box);

  }

}



// SINH VẬT GÂY NHIỄU
function createNoise(){

  let noise =
    document.createElement("div");

  noise.className =
    "fly noise";


  let icons =
    ["🦋","🐞","🪰","🐛","🐌"];


  noise.innerHTML =
    icons[
      Math.floor(
        Math.random()*icons.length
      )
    ];


  document.body.appendChild(noise);

  moveFly(noise);


  // BAY
  setInterval(function(){

    if(document.body.contains(noise)){

      moveFly(noise);

    }

  },1200);


  // ĐẾM CÔN TRÙNG
  noiseCount++;


  // CỨ 2 CON -> MẤT 1 ONG
  if(noiseCount % 2 == 0){

    removeOneBee();

  }


  updateUI();

}


// XÓA 1 ONG
function removeOneBee(){

  let bees =
    document.querySelectorAll(".bee");


  // HẾT ONG
  if(bees.length <= 1){

    bees[0]?.remove();

    updateUI();

    setTimeout(function(){

      alert("GAME OVER 😵");

      location.reload();

    },200);

    return;

  }


  // XÓA 1 ONG
  bees[0].remove();

  updateUI();

}


// TẠO ONG
function createFly(){

  let beeCount =
    document.querySelectorAll(".bee").length;


  if(beeCount >= maxBee){
    return;
  }


  let fly =
    document.createElement("div");

  fly.innerHTML = "🐝";

  fly.className =
    "fly bee";


  let randomWord =
    words[
      Math.floor(
        Math.random()*words.length
      )
    ];


  fly.dataset.english =
    randomWord.english;

  fly.dataset.vietnamese =
    randomWord.vietnamese;


  document.body.appendChild(fly);

  moveFly(fly);


  // BẤM ONG
  fly.onclick = function(){

    navigator.vibrate(30);


    currentFly = fly;

    currentAnswer =
      fly.dataset.vietnamese;


    // POPUP
    wordBox.innerHTML =
      fly.dataset.english;


    let currentX =
      parseInt(fly.style.left);

    let currentY =
      parseInt(fly.style.top);


    wordBox.style.display =
      "block";

    wordBox.style.left =
      (currentX + 70) + "px";

    wordBox.style.top =
      (currentY - 10) + "px";


    // HIỆU ỨNG
    wordBox.style.transform =
      "scale(1.2)";


    setTimeout(function(){

      wordBox.style.transform =
        "scale(1)";

    },150);


    // ĐÁP ÁN
    createAnswerBoxes(
      fly.dataset.vietnamese
    );

  }


  // ONG BAY
  setInterval(function(){

    if(document.body.contains(fly)){

      moveFly(fly);

    }

  },1500);

}


// DI CHUYỂN
function moveFly(fly){

  let x =
    Math.random() *
    (window.innerWidth - 100);

  let y =
    Math.random() *
    (window.innerHeight - 260);

  fly.style.left = x + "px";

  fly.style.top = y + "px";

}


// PANEL
document
  .getElementById("openButton")
  .onclick = function(){

    let panel =
      document.getElementById("loaderPanel");

    if(panel.style.display == "none"){

      panel.style.display =
        "block";

    }else{

      panel.style.display =
        "none";

    }

  }


// LOAD
document
  .getElementById("loadButton")
  .onclick = function(){

    loadVocabulary();

  }


// START
loadVocabulary();

createFly();
createFly();
createFly();

updateUI();

</script>

</body>
</html>
