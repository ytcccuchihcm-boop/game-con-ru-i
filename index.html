<!DOCTYPE html>
<html>

<head>

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    minimum-scale=1,
    maximum-scale=1,
    user-scalable=no
  "
>

<style>

html,body{
  margin:0;
  overflow:hidden;
  background:#d6f3ff;
  font-family:Arial;
  touch-action:none;
  overscroll-behavior:none;
  user-select:none;
}

.fly{
  position:absolute;
  font-size:55px;
  cursor:pointer;
  transition:0.15s;
  z-index:10;
}

#score{
  position:fixed;
  top:10px;
  left:10px;
  background:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:24px;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#openButton{
  position:fixed;
  top:10px;
  right:10px;
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  font-size:30px;
  background:white;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#loaderPanel{
  position:fixed;
  top:80px;
  right:10px;
  width:220px;
  background:white;
  border-radius:20px;
  padding:10px;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  display:none;
}

#vocabInput{
  width:100%;
  height:90px;
  font-size:14px;
  border-radius:10px;
  padding:8px;
  box-sizing:border-box;
}

#loadButton{
  margin-top:8px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:white;
  font-size:16px;
  font-weight:bold;
}

.answerBox{
  position:fixed;
  bottom:35px;
  width:22%;
  height:85px;
  background:white;
  border:4px solid black;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.15s;
}

#word{
  position:absolute;
  background:yellow;
  padding:12px 20px;
  border:4px solid black;
  border-radius:25px;
  font-size:34px;
  font-weight:bold;
  z-index:20;
  pointer-events:none;
  box-shadow:0 6px 12px rgba(0,0,0,0.25);
  transition:0.5s;
  display:none;
}

</style>
</head>

<body>

<div id="score">
Điểm: 0
</div>

<button id="openButton">
📚
</button>

<div id="word"></div>


<div id="loaderPanel">

<textarea id="vocabInput">
apple=quả táo
banana=quả chuối
dog=con chó
cat=con mèo
fish=cá
bee=con ong
girl=bé gái
sun=mặt trời
car=xe hơi
</textarea>

<button id="loadButton">
Nạp bài học 😄
</button>

</div>


<script>


// KHÓA ZOOM
document.addEventListener(
  "gesturestart",
  function(e){
    e.preventDefault();
  }
);

document.addEventListener(
  "dblclick",
  function(e){
    e.preventDefault();
  },
  { passive:false }
);


let score = 0;

let currentAnswer = "";

let currentFly = null;

let noiseCount = 0;

const scoreBox =
  document.getElementById("score");

const wordBox =
  document.getElementById("word");


// ÂM THANH
const hitSound =
  new Audio(
    "https://www.soundjay.com/button/sounds/button-16.mp3"
  );

const correctSound =
  new Audio(
    "https://www.soundjay.com/button/sounds/button-09.mp3"
  );

const wrongSound =
  new Audio(
    "https://www.soundjay.com/button/sounds/button-10.mp3"
  );


// DANH SÁCH TỪ
let words = [];


// NẠP TỪ
function loadVocabulary(){

  words = [];

  let text =
    document.getElementById("vocabInput").value;

  let lines = text.split("\n");


  for(let line of lines){

    if(line.includes("=")){

      let parts = line.split("=");

      words.push({
        english: parts[0].trim(),
        vietnamese: parts[1].trim()
      });

    }

  }

}


// TẠO ĐÁP ÁN
function createAnswerBoxes(correctAnswer){

  let oldBoxes =
    document.querySelectorAll(".answerBox");

  oldBoxes.forEach(box => box.remove());


  let answerList = [];

  answerList.push(correctAnswer);


  while(answerList.length < 4){

    let randomWord =
      words[
        Math.floor(
          Math.random() * words.length
        )
      ];

    if(
      !answerList.includes(
        randomWord.vietnamese
      )
    ){

      answerList.push(
        randomWord.vietnamese
      );

    }

  }


  answerList.sort(
    () => Math.random() - 0.5
  );


  for(let i=0; i<answerList.length; i++){

    let box =
      document.createElement("div");

    box.className =
      "answerBox";

    box.innerHTML =
      answerList[i];

    box.dataset.answer =
      answerList[i];

    box.style.left =
      (i * 24 + 2) + "%";


    box.onclick = function(){

      if(currentFly == null){
        return;
      }


      // CHỮ BAY XUỐNG
      wordBox.style.left =
        box.style.left;

      wordBox.style.top =
        "78%";


      // ĐÚNG
      if(
        currentAnswer ==
        box.dataset.answer
      ){

        correctSound.currentTime = 0;

        correctSound.play();

        score += 5;

        updateScore();


        box.style.background =
          "#9cff9c";


        setTimeout(function(){

          wordBox.style.display =
            "none";

        },500);

      }


      // SAI
      else{

        wrongSound.currentTime = 0;

        wrongSound.play();


        createNoise();


        box.style.background =
          "#ff9c9c";


        box.style.transform =
          "scale(1.1)";


        setTimeout(function(){

          box.style.transform =
            "scale(1)";

        },150);

      }


      currentFly = null;

    }


    document.body.appendChild(box);

  }

}



// SINH VẬT GÂY NHIỄU
function createNoise(){

  let noise =
    document.createElement("div");

  noise.className =
    "fly";


  let icons =
    ["🦋","🐞","🪰"];


  noise.innerHTML =
    icons[
      Math.floor(
        Math.random()*icons.length
      )
    ];


  document.body.appendChild(noise);

  moveFly(noise);


  setInterval(function(){

    if(document.body.contains(noise)){

      moveFly(noise);

    }

  },1200);


  noiseCount++;


  // GAME OVER
  if(noiseCount >= 15){

    alert("GAME OVER 😵");

    location.reload();

  }

}



// TẠO ONG
function createFly(){

  let beeCount =
    document.querySelectorAll(".bee").length;


  if(beeCount >= 5){
    return;
  }


  let fly =
    document.createElement("div");

  fly.innerHTML = "🐝";

  fly.className =
    "fly bee";


  // CHỌN TỪ
  let randomWord =
    words[
      Math.floor(
        Math.random() * words.length
      )
    ];


  fly.dataset.english =
    randomWord.english;

  fly.dataset.vietnamese =
    randomWord.vietnamese;


  document.body.appendChild(fly);

  moveFly(fly);


  // BẤM ONG
  fly.onclick = function(){

    hitSound.currentTime = 0;

    hitSound.play();


    currentFly = fly;

    currentAnswer =
      fly.dataset.vietnamese;


    // POPUP
    wordBox.innerHTML =
      fly.dataset.english;


    let currentX =
      parseInt(fly.style.left);

    let currentY =
      parseInt(fly.style.top);


    wordBox.style.display =
      "block";

    wordBox.style.left =
      (currentX + 90) + "px";

    wordBox.style.top =
      (currentY - 10) + "px";


    // HIỆU ỨNG
    wordBox.style.transform =
      "scale(1.2) rotate(-5deg)";


    setTimeout(function(){

      wordBox.style.transform =
        "scale(1) rotate(0deg)";

    },150);


    // ĐÁP ÁN
    createAnswerBoxes(
      fly.dataset.vietnamese
    );


    // ONG KHÔNG BIẾN MẤT
    fly.style.transform =
      "scale(1.4)";


    setTimeout(function(){

      fly.style.transform =
        "scale(1)";

    },150);

  }


  // ONG BAY
  setInterval(function(){

    if(document.body.contains(fly)){

      moveFly(fly);

    }

  }, getFlySpeed());

}


// DI CHUYỂN
function moveFly(fly){

  let x =
    Math.random() *
    (window.innerWidth - 100);

  let y =
    Math.random() *
    (window.innerHeight - 260);

  fly.style.left = x + "px";

  fly.style.top = y + "px";

}


// TỐC ĐỘ
function getFlySpeed(){

  if(score < 20){
    return 1800;
  }

  if(score < 40){
    return 1400;
  }

  return 1000;

}


// ĐIỂM
function updateScore(){

  scoreBox.innerHTML =
    "Điểm: " + score;

}


// NẠP BÀI HỌC
document
  .getElementById("loadButton")
  .onclick = function(){

    loadVocabulary();

}


// MỞ / ĐÓNG BẢNG
document
  .getElementById("openButton")
  .onclick = function(){

    let panel =
      document.getElementById("loaderPanel");

    if(panel.style.display == "none"){

      panel.style.display = "block";

    }else{

      panel.style.display = "none";

    }

  }


// KHỞI TẠO
loadVocabulary();

for(let i=0;i<5;i++){

  createFly();

}


// LUÔN GIỮ ONG
setInterval(function(){

  createFly();

},1500);

</script>

</body>
</html>
