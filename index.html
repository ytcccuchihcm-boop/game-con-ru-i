<!-- VERSION 2.0 BASE FILE -->
<!DOCTYPE html>
<html>

<head>
<!-- Version 2.0 Upgrade Ready -->


<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    minimum-scale=1,
    maximum-scale=1,
    user-scalable=no,
    viewport-fit=cover
  "
>

<style>

html,body{
  margin:0;
  overflow:hidden;
  background:#d6f3ff;
  font-family:Arial;
  touch-action:none;
  overscroll-behavior:none;
  user-select:none;
  width:100%;
  height:100%;
  position:fixed;
}

.fly{
  position:absolute;
  font-size:55px;
  cursor:pointer;
  transition:0.5s;
  z-index:10;
}

#score{
  position:fixed;
  top:10px;
  left:10px;
  background:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:22px;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#beeCount{
  display:none;
}
  position:fixed;
  top:10px;
  right:10px;
  background:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:22px;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#bestScore{

  position:fixed;

  top:70px;

  left:10px;

  background:white;

  padding:10px 18px;

  border-radius:20px;

  font-size:18px;

  background:white;

  padding:10px 18px;

  border-radius:20px;

  font-size:18px;

  z-index:999;

  box-shadow:
    0 4px 10px rgba(0,0,0,0.2);

  max-width:230px;

}


/*  */

#gameOverText{

  position:fixed;

  top:50%;
  left:50%;

  transform:
    translate(-50%,-50%);

  font-size:70px;

  font-weight:bold;

  color:red;

  text-shadow:
    4px 4px 10px black;

  z-index:99999;

  display:none;

  animation:
    boom 0.8s infinite;

}


/* WIN */

#winText{

  position:fixed;

  top:40%;
  left:50%;

  transform:
    translate(-50%,-50%);

  font-size:75px;

  font-weight:bold;

  color:lime;

  text-shadow:
    4px 4px 10px black;

  z-index:99999;

  display:none;

  animation:
    boom 0.8s infinite;

}


/* NÚT CHƠI LẠI */

#restartButton{

  position:fixed;

  top:58%;
  left:50%;

  transform:
    translateX(-50%);

  padding:18px 35px;

  font-size:28px;

  font-weight:bold;

  border:none;

  border-radius:25px;

  background:#4caf50;

  color:white;

  z-index:99999;

  display:none;

  box-shadow:
    0 6px 14px rgba(0,0,0,0.3);

}


@keyframes boom{

  0%{
    transform:
      translate(-50%,-50%)
      scale(1);
  }

  50%{
    transform:
      translate(-50%,-50%)
      scale(1.2);
  }

  100%{
    transform:
      translate(-50%,-50%)
      scale(1);
  }

}


#openButton{

  position:fixed;
  top:80px;
  right:10px;

  width:60px;
  height:60px;

  border:none;
  border-radius:50%;

  font-size:30px;

  background:white;

  z-index:999;
}

#listenButton{

  position:fixed;

  top:150px;

  right:10px;

  width:160px;

  height:50px;

  border:none;

  border-radius:25px;

  background:#4caf50;

  color:white;

  font-size:20px;

  font-weight:bold;

  z-index:999;

  box-shadow:
    0 4px 10px rgba(0,0,0,0.2);
}

#studyModeButton{

  position:fixed;

  top:210px;

  right:10px;

  width:180px;

  height:50px;

  border:none;

  border-radius:25px;

  background:#2196f3;

  color:white;

  font-size:18px;

  font-weight:bold;

  z-index:999;

}
  #loaderPanel{
  position:fixed;
  top:150px;
  right:10px;
  width:220px;
  background:white;
  border-radius:20px;
  padding:10px;
  z-index:999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  display:none;
}

#vocabInput{
  width:100%;
  height:90px;
  font-size:14px;
  border-radius:10px;
  padding:8px;
  box-sizing:border-box;
}

#loadButton{
  margin-top:8px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:white;
  font-size:16px;
  font-weight:bold;
}

.answerBox{
  position:fixed;
  bottom:35px;
  width:42%;
  height:85px;
  background:white;
  border:4px solid black;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.3s;
}

#word{
  position:absolute;
  background:#fff176;
  min-width:120px;
  text-align:center;
  padding:12px 20px;
  border:4px solid black;
  border-radius:25px;
  font-size:28px;
  font-weight:bold;
  z-index:20;
  pointer-events:none;
  box-shadow:0 6px 12px rgba(0,0,0,0.25);
  transition:0.5s;
  display:none;
}

#penaltyText{

  position:fixed;

  top:75%;

  left:50%;

  transform:
    translate(-50%,-50%);

  font-size:80px;

  font-weight:bold;

  color:#ff0000;

  text-shadow:
    4px 4px 12px black;

  display:none;

  z-index:99999;

  animation:
    boom 0.6s infinite;

}
</style>
</head>

<body>

<div id="score">
Điểm: 0
</div>

<div id="beeCount">
🐝 3
</div>

<div id="bestScore">
🏆 Chưa có kỷ lục
</div>

<button id="openButton">
📚
</button>
<button id="listenButton">
🎧 OFF
</button>
  <button id="studyModeButton">
🎲 NGẪU NHIÊN
</button>

<div id="word"></div>

<div id="gameOverText">
GAME OVER
</div>
<div id="penaltyText">
💥 -100 ĐIỂM
</div>

<div id="winText">
WIN
</div>

<button id="restartButton">
Chơi lại lần nữa!
</button>


<div id="loaderPanel">

<textarea id="vocabInput">
apple=quả táo
banana=quả chuối
dog=con chó
cat=con mèo
fish=cá
sun=mặt trời
car=xe hơi
girl=bé gái
</textarea>

<button id="loadButton">
Nạp bài học 😄
</button>

</div>


<script>


// KHÓA ZOOM
document.addEventListener(
  "gesturestart",
  function(e){
    e.preventDefault();
  }
);

document.addEventListener(
  "dblclick",
  function(e){
    e.preventDefault();
  },
  { passive:false }
);


// ĐIỂM
let score = Number(
  localStorage.getItem("saveScore")
) || 0;

let currentAnswer = "";

let currentFly = null;

let noiseCount = Number(
  localStorage.getItem("saveNoise")
) || 0;

let maxBee = 3;

let level = Number(localStorage.getItem("animalLevel") || 0);

const levelAnimals = [
"🐝","🐦","🕊️","🐇","🐕","🐎","🐄","🐘","🦕","🦖","🐉"
];
let studyMode =

localStorage.getItem(
  "studyMode"
) || "random";

let listeningMode =

localStorage.getItem(
  "listeningMode"
) == "true";

localStorage.getItem(
  "studyMode"
) || "random";

localStorage.getItem(
  "listeningMode"
) == "true";

// KỶ LỤC
let highScore =
  localStorage.getItem("highScore") || 0;

let highName =
  localStorage.getItem("highName") || "";


// TIẾN ĐỘ TỪ
let wordProgress = {};


const scoreBox =
  document.getElementById("score");

const beeBox =
  document.getElementById("beeCount");

const bestBox =
  document.getElementById("bestScore");

const wordBox =
  document.getElementById("word");


// DANH SÁCH TỪ
let words = [];


// UPDATE
function updateUI(){

  scoreBox.innerHTML =
    "Điểm: " + score;


  let beeCount =
    document.querySelectorAll(".bee").length;

  beeBox.innerHTML =
    levelAnimals[level % levelAnimals.length] + " " + beeCount;


  if(highScore > 0){

    bestBox.innerHTML =
      "🏆 " +
      highName +
      " : " +
      highScore;

  }

}


// GAME OVER
function gameOver(){

  document
    .getElementById("gameOverText")
    .style.display =
      "block";
  // TRỪ 100 ĐIỂM

score -= 100;

if(score < 0){

  score = 0;

}

updateUI();
  localStorage.setItem(
  "saveScore",
  score
);

document
  .getElementById("penaltyText")
  .style.display =
    "block";


  navigator.vibrate(
    [300,100,300]
  );


  if(score > highScore){

    let player =
      prompt(
        "🏆 Kỷ lục mới! Nhập tên:"
      );

    if(player){

      localStorage.setItem(
        "highScore",
        score
      );

      localStorage.setItem(
        "highName",
        player
      );

    }

  }


  document.body.style.pointerEvents =
    "none";


setTimeout(function(){

  location.reload();

},5000);

}


// WIN
function winGame(){
  localStorage.removeItem(
  "saveWordProgress"
);
  localStorage.removeItem("saveScore");

localStorage.removeItem("saveNoise");

localStorage.removeItem("saveWordProgress");

  level++;
  localStorage.setItem("animalLevel", level);

  let nextAnimal =
    levelAnimals[level % levelAnimals.length];

  document.getElementById("winText").innerHTML =
    "WIN<br>Mở khóa " + nextAnimal;

  document.getElementById("winText").style.display =
    "block";

  document.getElementById("restartButton").style.display =
    "block";

  navigator.vibrate([100,50,100,50,100]);

  document.querySelectorAll(".fly").forEach(f=>{
    f.style.pointerEvents = "none";
  });

}


// NÚT CHƠI LẠI
document
  .getElementById("restartButton")
  .onclick = function(){

localStorage.removeItem(
  "saveWordProgress"
);

location.reload();

  }


// LOAD TỪ
function loadVocabulary(){

  words = [];

  wordProgress = {};

  let text =
    document.getElementById("vocabInput").value;

  let lines =
    text.split("\n");

  for(let line of lines){

    if(line.includes("=")){

      let parts =
        line.split("=");

      let english =
        parts[0].trim();

      let vietnamese =
        parts[1].trim();

      words.push({

        english:english,
        vietnamese:vietnamese

      });

      wordProgress[english] = 0;

    }
// KHÔI PHỤC TIẾN ĐỘ

let savedProgress =

localStorage.getItem(
  "saveWordProgress"
);

if(savedProgress){

  wordProgress =

    JSON.parse(
      savedProgress
    );

}
  }


  // KHÔI PHỤC TIẾN ĐỘ ĐÃ LƯU

  let savedProgress =

    localStorage.getItem(
      "saveWordProgress"
    );

  if(savedProgress){

    wordProgress =

      JSON.parse(
        savedProgress
      );

  }

}


// KIỂM TRA WIN
function checkWin(){

  for(let key in wordProgress){

    if(wordProgress[key] < 3){

      return false;

    }

  }

  return true;

}


// TỪ CHƯA HOÀN THÀNH
function getAvailableWords(){

  let availableWords =

    words.filter(word =>

      wordProgress[word.english] < 3

    );

  if(studyMode == "ordered"){

    if(availableWords.length > 0){

      return [availableWords[0]];

    }

  }

  return availableWords;

}


// TẠO ĐÁP ÁN
function createAnswerBoxes(correctAnswer){

  document
    .querySelectorAll(".answerBox")
    .forEach(box=>box.remove());


  let answers = [];

  answers.push(correctAnswer);


  while(answers.length < 2){

    let random =
      words[
        Math.floor(
          Math.random()*words.length
        )
      ];

    if(
      !answers.includes(
        random.vietnamese
      )
    ){

      answers.push(
        random.vietnamese
      );

    }

  }


  answers.sort(
    ()=>Math.random()-0.5
  );


  for(let i=0;i<2;i++){

    let box =
      document.createElement("div");

    box.className =
      "answerBox";

    box.innerHTML =
      answers[i];

box.dataset.answer =
  answers[i];


// LƯU TỪ TIẾNG ANH

let foundWord =

words.find(

  w =>

  w.vietnamese === answers[i]

);

if(foundWord){

  box.dataset.english =

    foundWord.english;

}


    if(i==0){

      box.style.left =
        "4%";

    }else{

      box.style.right =
        "4%";

    }


    // NHẤP ĐÚP ĐỂ XEM TỪ

box.ondblclick = function(e){

  e.stopPropagation();

  wordBox.innerHTML =

    box.dataset.english;

  wordBox.style.display =

    "block";

  wordBox.style.left =

    box.offsetLeft + "px";

  wordBox.style.top =

    (box.offsetTop - 80) + "px";

  setTimeout(function(){

    wordBox.style.display =

      "none";

  },2000);

};
    box.onclick = function(){

      if(currentFly == null){
        return;
      }


      // CHỮ BAY

      if(i==0){

        wordBox.style.left =
          "10%";

      }else{

        wordBox.style.left =
          "55%";

      }

      wordBox.style.top =
        (window.innerHeight - 220) + "px";


      // ĐÚNG
      if(
        box.dataset.answer ==
        currentAnswer
      ){

        navigator.vibrate([40,30,40]);

        score += 5;
        localStorage.setItem(
  "saveScore",
  score
);

        updateUI();


        // TĂNG ĐẾM
        let englishWord =
          currentFly.dataset.english;

        wordProgress[
          englishWord
        ]++;
        localStorage.setItem(

  "saveWordProgress",

  JSON.stringify(
    wordProgress
  )

);
        localStorage.setItem(
  "saveWordProgress",
  JSON.stringify(wordProgress)
);


        // ĐỦ 3 LẦN -> XÓA ONG
        if(
          wordProgress[englishWord] >= 3
        ){

          currentFly.remove();

        }


        // SINH ONG MỚI
        createFly();


        // KIỂM TRA WIN
        if(checkWin()){

          winGame();

          return;

        }


        box.style.background =
          "#9cff9c";


        setTimeout(function(){

          wordBox.style.display =
            "none";

        },500);

      }


      // SAI
      else{

        navigator.vibrate([100,50,100]);

        createNoise();


        box.style.background =
          "#ff9c9c";


        setTimeout(function(){

          box.style.background =
            "white";

        },300);

      }


      currentFly = null;

    }

    document.body.appendChild(box);

  }

}



// SINH VẬT GÂY NHIỄU
function createNoise(){

  let noise =
    document.createElement("div");

  noise.className =
    "fly noise";


  let icons =
    ["🦋","🐞","🐌","🦗","🐜","🐛","🐌"];


  noise.innerHTML =
    icons[
      Math.floor(
        Math.random()*icons.length
      )
    ];


  // BẤM NHẦM
  noise.onclick = function(){

    navigator.vibrate(
      [200,100,200]
    );

    gameOver();

  }


  document.body.appendChild(noise);

  moveFly(noise);


  setInterval(function(){

    if(document.body.contains(noise)){

      moveFly(noise);

    }

  },1200);


  noiseCount++;
  localStorage.setItem(
  "saveNoise",
  noiseCount
);


  // 2 CON -> MẤT ONG
  if(noiseCount % 2 == 0){

    removeOneBee();

  }


  updateUI();

}


// XÓA ONG
function removeOneBee(){

  let bees =
    document.querySelectorAll(".bee");


  if(bees.length <= 1){

    bees[0]?.remove();

    updateUI();

    gameOver();

    return;

  }


  bees[0].remove();

  updateUI();

}


// TẠO ONG
function createFly(){

  let beeCount =
    document.querySelectorAll(".bee").length;


  if(beeCount >= maxBee){
    return;
  }


  // CHỈ LẤY TỪ CHƯA ĐỦ 3 LẦN
  let availableWords =
    getAvailableWords();


  if(availableWords.length <= 0){

    winGame();

    return;

  }


  let fly =
    document.createElement("div");

  fly.innerHTML = levelAnimals[level % levelAnimals.length];

  fly.className =
    "fly bee";


  let randomWord =
    availableWords[
      Math.floor(
        Math.random()*availableWords.length
      )
    ];


  fly.dataset.english =
    randomWord.english;

  fly.dataset.vietnamese =
    randomWord.vietnamese;


  document.body.appendChild(fly);

  moveFly(fly);


  // BẤM ONG
  fly.onclick = function(){

    navigator.vibrate(30);


    // ĐỌC TIẾNG ANH

    let speak =

      new SpeechSynthesisUtterance(

        fly.dataset.english

      );

    speak.lang = "en-US";

    speak.rate = 0.9;

    speechSynthesis.cancel();

    speechSynthesis.speak(speak);


    currentFly = fly;

    currentAnswer =
      fly.dataset.vietnamese;


    wordBox.innerHTML =
      fly.dataset.english;


    let currentX =
      parseInt(fly.style.left);

    let currentY =
      parseInt(fly.style.top);


    // KHÔNG CHO CHỮ RA NGOÀI MÀN HÌNH

    let popupX =
      currentX + 70;


    if(
      popupX >
      window.innerWidth - 220
    ){

      popupX =
        window.innerWidth - 220;

    }


    if(popupX < 10){

      popupX = 10;

    }


if(!listeningMode){

  wordBox.style.display =
    "block";

  wordBox.style.left =
    popupX + "px";

  wordBox.style.top =
    (currentY - 10) + "px";

}else{

  wordBox.style.display =
    "none";

}


    wordBox.style.transform =
      "scale(1.2)";


    setTimeout(function(){

      wordBox.style.transform =
        "scale(1)";

    },150);


    createAnswerBoxes(
      fly.dataset.vietnamese
    );

  }


  // ONG BAY
  setInterval(function(){

    if(document.body.contains(fly)){

      moveFly(fly);

    }

  },1500);

}


// DI CHUYỂN
function moveFly(fly){

  // KHÔNG CHO BAY RA MÉP

  let safeLeft = 40;

  let safeRight = 180;

  let safeTop = 120;

  let safeBottom = 320;


  let x =

    safeLeft +

    Math.random() *

    (
      window.innerWidth
      - safeRight
      - safeLeft
    );


  let y =

    safeTop +

    Math.random() *

    (
      window.innerHeight
      - safeBottom
      - safeTop
    );


  fly.style.left =
    x + "px";

  fly.style.top =
    y + "px";

}


// PANEL
document
  .getElementById("openButton")
  .onclick = function(){

    let panel =
      document.getElementById("loaderPanel");

    if(panel.style.display == "none"){

      panel.style.display =
        "block";

    }else{

      panel.style.display =
        "none";

    }

  }


// LOAD
document
  .getElementById("loadButton")
  .onclick = function(){

    // LƯU TỪ
    localStorage.setItem(

      "savedVocabulary",

      document.getElementById(
        "vocabInput"
      ).value

    );

    loadVocabulary();

  }


// KHÔI PHỤC TỪ ĐÃ LƯU

let savedWords =

  localStorage.getItem(
    "savedVocabulary"
  );

if(savedWords){

  document.getElementById(
    "vocabInput"
  ).value = savedWords;

}

// LUYỆN NGHE

const listenButton =

document.getElementById(
  "listenButton"
);

function updateListenButton(){

  listenButton.innerHTML =

    listeningMode

    ?

    "🎧 NGHE"

    :

    "📖 HỌC";

}

updateListenButton();

listenButton.onclick = function(){


  listeningMode =
    !listeningMode;

  localStorage.setItem(

    "listeningMode",

    listeningMode

  );

  updateListenButton();

};
const studyModeButton =

document.getElementById(
  "studyModeButton"
);

function updateStudyModeButton(){

  if(studyMode == "random"){

    studyModeButton.innerHTML =
      "🎲 NGẪU NHIÊN";

  }else{

    studyModeButton.innerHTML =
      "📚 THEO THỨ TỰ";

  }

}

updateStudyModeButton();

studyModeButton.onclick =
function(){

  if(studyMode == "random"){

    studyMode = "ordered";

  }else{

    studyMode = "random";

  }

  localStorage.setItem(
    "studyMode",
    studyMode
  );

  updateStudyModeButton();

};

// START
loadVocabulary();

createFly();
createFly();
createFly();

updateUI();

</script>

</body>
</html>
